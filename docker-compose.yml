
# HeartCompass Docker Compose — WP5.3
version:'3.8'
services:
  db:
    image:pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:heartcompass
      POSTGRES_USER:${DB_USER}
      POSTGRES_PASSWORD:${DB_PASSWORD}
    ports:["5432:5432"]
    volumes:[pgdata:/var/lib/postgresql/data]
  app:
    build:.
    depends_on:[db]
    environment:
      DATABASE_URL:postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/heartcompass
volumes:
  pgdata:
